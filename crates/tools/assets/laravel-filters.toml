# -- composer install / update --------------------------------------------------
[filters.composer-install-update]
description = "composer install / update / upgrade — collapse clean runs, keep conflicts"
match_command = '^composer\s+(install|update|upgrade)\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^Nothing to install, update or remove', message = "composer: nothing to do", unless = '(?i)(\berror\b|\bconflict\b|\babandon|\bdeprecat|vulnerability found|\bfail|\bfatal\b|\bexception\b)' },
  { pattern = '(?m)^Nothing to modify in lock file', message = "composer: nothing to do", unless = '(?i)(\berror\b|\bconflict\b|\babandon|\bdeprecat|vulnerability found|\bfail|\bfatal\b|\bexception\b)' },
]
strip_lines_matching = [
  '^Loading composer repositories',
  '^Updating dependencies',
  '^Installing dependencies from lock file',
  '^Writing lock file',
  '^Verifying lock file contents',
  '^\s*- Downloading ',
  '^\s*- Locking ',
  '^\s*- Syncing ',
  '^\s*- Installing .*?: Extracting archive\s*$',
  '^\s*- Extracting archive',
  '^Generating optimized autoload files',
  '^> Illuminate\\Foundation\\ComposerScripts',
  '^> @php ',
  '^\s*INFO\s+Discovering packages',
  '^\s*INFO\s+No publishable resources',
  '^\s*[\w/-]+\s+\.+\s*DONE\s*$',
  '^\d+ packages you are using are looking for funding',
  '^Use the `composer fund`',
  '^\d+ package suggestions were added',
  '^No security vulnerability advisories found',
  '^\s*$',
]
max_lines = 60
on_empty = "composer: ok"

