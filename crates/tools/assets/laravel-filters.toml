# =============================================================================
# AGENT 6 — pest (direct)
# =============================================================================

# =============================================================================
# Pest — direct invocation (vendor/bin/pest, pest, php vendor/bin/pest)
# Must NOT shadow artisan-test. artisan test has basename "artisan" or "php",
# so it never matches here. Our anchor is strictly `pest` at start.
# =============================================================================

[filters.pest]
description = "Pest — keep failures, skips, exceptions, coverage errors, summary"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/)?pest\b'
strip_ansi = true
filter_stderr = true

# Strip the ANSI cursor-move artifact from --parallel runs
replace = [
  { pattern = '^\s*\d+A\s+', replacement = '' },
]

# Short-circuit clean runs. Any failure/error/exception/skip/incomplete
# disables this so we preserve the real output.
match_output = [
  { pattern = '(?m)^\s*Tests:\s+\d+ passed\s', message = "pest: ok", unless = '(?i)(failed|error|exception|fatal|risked|incomplete|skipped|warn|no tests found|no code coverage)' },
  { pattern = '(?m)^\s*INFO\s+No tests found', message = "pest: no tests matched" },
  { pattern = '(?m)^\s*ERROR\s+No code coverage driver', message = "pest error: no code coverage driver available (install Xdebug or PCOV)" },
]

# Drop only known noise. Keep everything else (failure messages, exception
# text, diff lines all survive).
strip_lines_matching = [
  '^\s*$',
  # The horizontal rule between failures
  '^\s*─{10,}\s*$',
  # The code preview lines (numbered source like "   4▕     ..." or "➜  8▕ ...")
  '^\s*(➜\s+)?\d+▕',
  # The footer "1   tests/Foo.php:NN" repeater
  '^\s*\d+\s+tests/\S+\.php:\d+\s*$',
]

truncate_lines_at = 300
max_lines = 120
on_empty = "pest: ok"

