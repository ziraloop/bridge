# =============================================================================
# Laravel Pint
# =============================================================================
#
# In non-TTY mode Pint emits JSON (single line):
#   - Clean:  {"tool":"pint","result":"passed"}
#   - Fail:   {"tool":"pint","result":"fail","files":[{"path":"...","fixers":[...]}]}
#   - Fixed:  {"tool":"pint","result":"fixed","files":[...]}
# We collapse the JSON to a human-readable one-liner listing affected files.

[filters.pint]
description = "Laravel Pint — collapse JSON output to concise file list + status"
match_command = '^(?:php\s+)?(?:\./)?vendor/bin/pint\b|^pint\b'
strip_ansi = true
filter_stderr = true
replace = [
  # JSON "passed" -> ok
  { pattern = '^\{"tool":"pint","result":"passed"\}\s*$', replacement = 'pint: ok' },
  # Normalize JSON-escaped slashes (\/ -> /).
  { pattern = '\\/', replacement = '/' },
  # Collapse each file object to just its path, one per "line" separated by \n.
  { pattern = '\{"path":"([^"]+)","fixers":\[[^\]]*\]\}', replacement = "PATHSEP  $1" },
  # Leading status prefix.
  { pattern = '^\{"tool":"pint","result":"fail","files":\[', replacement = "pint: FAIL" },
  { pattern = '^\{"tool":"pint","result":"fixed","files":\[', replacement = "pint: FIXED" },
  # Trailing closers.
  { pattern = '\]\}\s*$', replacement = '' },
  # Separator between file entries (comma became bare after collapse).
  { pattern = ',', replacement = '' },
  # Finally swap our sentinel for actual newlines.
  { pattern = 'PATHSEP', replacement = "\n" },
]
match_output = [
  { pattern = '(?m)^pint: ok\s*$', message = "pint: ok", unless = '(?i)(fail|error|fatal|exception)' },
]
strip_lines_matching = [
  '^Laravel Pint \d',
  '^\s*$',
  '^\s*[.⨯✓]+\s*\d+ files\s*$',
  '^\s*PASS\s*$',
]
max_lines = 80
on_empty = "pint: ok"

[[tests.pint]]
name = "clean passed collapses to ok"
input = '{"tool":"pint","result":"passed"}'
expected = "pint: ok"

[[tests.pint]]
name = "fail lists path"
input = '{"tool":"pint","result":"fail","files":[{"path":"app\/BadStyle.php","fixers":["class_definition","binary_operator_spaces"]}]}'
expected = """
pint: FAIL
  app/BadStyle.php
"""

[[tests.pint]]
name = "fixed lists path"
input = '{"tool":"pint","result":"fixed","files":[{"path":"app\/BadStyle.php","fixers":["class_definition"]}]}'
expected = """
pint: FIXED
  app/BadStyle.php
"""

[[tests.pint]]
name = "fail multiple files"
input = '{"tool":"pint","result":"fail","files":[{"path":"app\/A.php","fixers":["x"]},{"path":"app\/B.php","fixers":["y"]}]}'
expected = """
pint: FAIL
  app/A.php
  app/B.php
"""

# =============================================================================
# AGENT 8 — phpstan / larastan (direct)
# =============================================================================

# =============================================================================
# PHPStan / Larastan (static analysis)
# =============================================================================
#
# Matches both `phpstan` and `larastan` binaries (larastan is phpstan with neon config).
# Also matches `vendor/bin/phpstan` (basename stripped by rtk).
#
# Key things to strip:
#  - Progress bar: " 0/3 [░░░] 0%" with block/shade chars
#  - "Instructions for interpreting errors" boilerplate banner (16 lines, emitted
#    by recent phpstan versions whenever errors exist — pure noise for LLMs)
#  - Table separators "------ ------" and the "Line   <file>" header row
#  - "Note: Using configuration file ..." info line
#
# Key things to KEEP:
#  - Final "[ERROR] Found N errors" / "[OK] No errors" status line
#  - Individual error lines with line numbers and messages
#  - Identifier tags (🪪 return.type etc)
#  - JSON blob when --error-format=json
#  - raw single-line errors when --error-format=raw (/path:line:msg)
#  - Memory exhausted / fatal errors

[filters.phpstan]
description = "phpstan / larastan — strip progress bar, instructions banner, table chrome"
match_command = '(?:^|/)(?:phpstan|larastan)\b'
strip_ansi = true
filter_stderr = true

# Short-circuit: clean run collapses to one line.
# `unless` preserves any error/warning/exception that slips into output.
match_output = [
  { pattern = '(?m)^\s*\[OK\] No errors', message = "phpstan: ok", unless = '(?i)(exception|fatal|allowed memory|parse error|uncaught)' },
]

# Drop known noise lines.
strip_lines_matching = [
  # Info header
  '^Note: Using configuration file',
  # Progress bar (block/shade chars, percentage, carriage returns handled by regex)
  '^\s*\d+/\d+\s*\[',
  '^\s*\[[░▓█▒▓=>\- ]+\]\s*\d+%',
  # "Instructions for interpreting errors" banner (stable 16-line boilerplate)
  '^Instructions for interpreting errors$',
  '^-{3,}$',
  '^Each error has an associated identifier',
  '^or `return\.missing`',
  '^Each error identifier has documentation at URL',
  '^This page contains code example',
  '^and instruction how to fix it',
  '^Before fixing the error, fetch the documentation page',
  '^The error usually indicates a real bug',
  '^Do not add `@phpstan-ignore',
  '^Do not use assert\(\) or inline @var',
  '^Do not add type casts just to silence',
  '^Do not widen parameter or return types',
  # Table separator rows (but NOT the "Line   <file>.php" header — that's
  # the only per-file attribution in pretty format, must be preserved).
  '^\s*-{3,}\s*-{3,}\s*$',
  # Blank lines
  '^\s*$',
]

# Per-line safety cap — generous because --error-format=json emits the entire
# result as a single line. Pretty-format error lines are <200 chars wrapped.
truncate_lines_at = 20000

# Overall safety cap — typical error runs are small, huge outputs indicate
# a real problem and we want to surface (not bury) them.
max_lines = 400

# Safety net: if everything got stripped (e.g. unusual output), emit status hint.
on_empty = "phpstan: no output"


