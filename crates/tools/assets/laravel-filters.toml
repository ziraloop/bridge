expected = "artisan inspire: (empty)"

# -----------------------------------------------------------------------------
# artisan list — short-circuit on bare `list`/`list <namespace>` output to
# drop the usage/options preamble; keep the command list.
# -----------------------------------------------------------------------------
[filters.artisan-list]
description = "artisan list — drop Usage/Options preamble, keep command list. JSON format passed through as-is."
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+list\b'
strip_ansi = true
filter_stderr = true
# If --format=json, output is a single long JSON line. We cannot easily detect
# the flag from the output, but JSON starts with `{"application"` — short-
# circuit to a compact summary.
match_output = [
  { pattern = '\{"application":\{"name":"Laravel Framework"', message = "artisan list (json): command catalog JSON — use `rtk proxy` for full output", unless = '(?i)\bfatal\b|Symfony\\\\Component\\\\Console\\\\Exception|PHP Parse error' },
]
strip_lines_matching = [
  '^Laravel Framework ',
  '^Usage:\s*$',
  '^\s*command \[options\]',
  '^Options:\s*$',
  '^\s*-h, --help',
  '^\s*--silent',
  '^\s*-q, --quiet',
  '^\s*-V, --version',
  '^\s*--ansi\|--no-ansi',
  '^\s*-n, --no-interaction',
  '^\s*--env\[=ENV\]',
  '^\s*-v\|vv\|vvv',
  '^Available commands(?:\s+for the .+ namespace)?:\s*$',
  '^\s*$',
]
max_lines = 200
on_empty = "artisan list: (empty)"

