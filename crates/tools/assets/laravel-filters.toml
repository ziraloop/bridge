# =============================================================================
# AGENT 10 — artisan long-running guards + zz-generic fallback
# =============================================================================

# =============================================================================
# SPECIFIC artisan filters come FIRST. Generic fallback is LAST.
# This ordering is critical — first-match-wins.
# =============================================================================

# Specific filter to prove precedence — migrate:* must win over artisan-zz-generic.
[filters.artisan-long-running]
description = "Long-running streaming commands — cap output + emit warning"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+(?:serve|tinker|queue:work|queue:listen|queue:listen-failed|horizon|horizon:[\w-]+|schedule:work|reverb:start|reverb:restart|reverb:ping|websockets:serve|pail|broadcast:serve|octane:start)\b'
strip_ansi = true
filter_stderr = true
replace = [
  # Insert a one-shot warning prefix before the first INFO banner.
  { pattern = '^(\s*INFO\s+)', replacement = """rtk: long-running command — output capped at 100 lines. Prefer raw invocation or `rtk proxy`.
$1""" },
]
strip_lines_matching = [
  '^\s*$',
  '^using dumb terminal settings\.$',
  '^No entry for terminal type ',
  '^\s*Press Ctrl\+C',
]
max_lines = 100
on_empty = "rtk: long-running command produced no output in buffer window. Prefer raw invocation or `rtk proxy`."

