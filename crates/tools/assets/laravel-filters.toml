# -- composer outdated ----------------------------------------------------------
[filters.composer-outdated]
description = "composer outdated — drop legend preamble, keep package list"
match_command = '^composer\s+(outdated|show\s+(--outdated|-o))\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^\s*$', message = "composer: all dependencies up to date", unless = '(?is)(\w/\w|error|fail|warning)' },
]
strip_lines_matching = [
  '^Legend:\s*$',
  '^!\s+patch or minor release available',
  '^~\s+major release available',
  '^\s*$',
]
truncate_lines_at = 160
max_lines = 80
on_empty = "composer: all dependencies up to date"

