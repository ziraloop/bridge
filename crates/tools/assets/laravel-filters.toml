# Laravel / PHP ecosystem — consolidated rtk filter definitions
# Generated 2026-04-24 by merging outputs from 10 parallel filter-design agents.
# Tested against fresh Laravel 13.0.0 projects.
#
# Covers: composer (install/update/require/remove/dump-autoload/outdated/show/
#   validate/create-project); php artisan (migrate/db:*/make:*/route:*/cache:*/
#   config:*/view:*/event:*/optimize*/test/about/inspire/list/help/vendor:publish/
#   schedule:*/queue:*/key:generate/model:show/down/up/...); vendor/bin/{pest,
#   phpunit,pint,phpstan,larastan}.
#
# CRITICAL: rtk matches filters by ALPHABETICAL filter NAME order (BTreeMap).
# File order here is cosmetic; runtime order is the sort order of filter names.
# The fallback `artisan-zz-generic` must sort last (achieved via the zz prefix).
#
# Install:
#   1. Copy this file to `.rtk/filters.toml` in your Laravel project root.
#   2. Run `rtk trust` (accepts on first use — rehash after every edit).
#   3. Use as `rtk composer install`, `rtk php artisan migrate`, etc.
#
# Verify inline tests: `rtk verify` (should show 100% passing).

schema_version = 1

# =============================================================================
# AGENT 1 — composer lifecycle
# =============================================================================

# =============================================================================
# Composer — Agent 1 (lifecycle filters)
# Ordering: specific filters before generic. First regex match on match_command wins.
# =============================================================================

# -- composer require / remove --------------------------------------------------
[filters.composer-require]
description = "composer require / remove — keep the install/remove summary, drop noise"
match_command = '^composer\s+(require|remove)\b'
strip_ansi = true
filter_stderr = true
strip_lines_matching = [
  '^Loading composer repositories',
  '^Updating dependencies',
  '^Running composer update',
  '^Writing lock file',
  '^Installing dependencies from lock file',
  '^\s*- Downloading ',
  '^\s*- Syncing ',
  '^\s*- Extracting archive',
  '^Generating optimized autoload files',
  '^> Illuminate\\Foundation\\ComposerScripts',
  '^> @php ',
  '^\s*INFO\s+Discovering packages',
  '^\s*INFO\s+No publishable resources',
  '^\s*[\w/-]+\s+\.+\s*DONE\s*$',
  '^\d+ packages you are using are looking for funding',
  '^Use the `composer fund`',
  '^\d+ package suggestions were added',
  '^No security vulnerability advisories found',
  '^\s*$',
]
max_lines = 25
on_empty = "composer: ok"

