# =============================================================================
# AGENT 9 — artisan info/queue/vendor/key:generate/down:up
# =============================================================================

# =============================================================================
# Agent 9 — Artisan informational, queue, vendor, and housekeeping commands
# Ordering note: all of these must appear BEFORE `artisan-generic` (owned by
# Agent 10) so that the more specific regex wins first-match-wins.
# =============================================================================

# -----------------------------------------------------------------------------
# artisan about — big structured multi-section table. Default format is lots
# of dotted box art; JSON format is compact and useful — preserve JSON, strip
# the box dots on table mode.
# -----------------------------------------------------------------------------
[filters.artisan-about]
description = "artisan about — strip dot-leader padding, keep label/value pairs; JSON format preserved"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+about\b'
strip_ansi = true
filter_stderr = true
replace = [
  # Collapse long dot runs used as leaders into a single separator.
  { pattern = '\s*\.{4,}\s*', replacement = ' : ' },
  # Trim trailing whitespace.
  { pattern = '\s+$', replacement = '' },
]
strip_lines_matching = [
  '^\s*$',
]
max_lines = 80
on_empty = "artisan about: (empty)"

[[tests.artisan-about]]
name = "default table output collapses dots"
input = """

  Environment ................................................................
  Application Name ................................................... Laravel
  Laravel Version ..................................................... 13.6.0
  PHP Version .......................................................... 8.5.0
  Environment .......................................................... local

  Cache ......................................................................
  Config .......................................................... NOT CACHED
"""
expected = """  Environment :
  Application Name : Laravel
  Laravel Version : 13.6.0
  PHP Version : 8.5.0
  Environment : local
  Cache :
  Config : NOT CACHED"""

[[tests.artisan-about]]
name = "json format left structurally intact (one line)"
input = '{"environment":{"application_name":"Laravel","laravel_version":"13.6.0"},"drivers":{"cache":"database"}}'
expected = '{"environment":{"application_name":"Laravel","laravel_version":"13.6.0"},"drivers":{"cache":"database"}}'

