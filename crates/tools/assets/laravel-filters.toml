strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^[^\n]*composer\.json is valid\s*$', message = "composer: composer.json is valid", unless = '(?i)(error|warning|fail|invalid|missing|should|must|required)' },
]
strip_lines_matching = [
  '^\s*$',
]
max_lines = 40
on_empty = "composer: composer.json is valid"

