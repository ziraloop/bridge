# =============================================================================
# AGENT 5 — artisan test (wrapper)
# =============================================================================

# =============================================================================
# artisan test — Pest/PHPUnit wrapper
# =============================================================================
# Design goals:
#   • Clean run (all passing)         → collapse to "artisan test: ok"  (~95% savings)
#   • Empty test match (no tests)     → keep "No tests found."
#   • Failures / errors / exceptions  → keep every FAIL block, the ⨯ line,
#                                       assertion diff, stack frame, and summary
#   • Coverage driver errors          → preserved via keep_lines_matching
#
# Pest uses unicode glyphs (✓ ⨯). PHPUnit uses ASCII (. × F E S R). We match
# both. The summary line "Tests: N passed (M assertions)" is emitted by both.
[filters.artisan-test]
description = "artisan test (Pest + PHPUnit) — ok-collapse on green, full detail on failure"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+test\b'
strip_ansi = true
filter_stderr = true

# Normalize: drop per-test duration suffixes and parallel "dots only" progress
# lines so downstream regexes can stay tight.
replace = [
  # Strip trailing "  0.05s" duration suffix ONLY on per-test bullet lines
  # (identified by the ✓ / ⨯ / × glyphs).  Leaves the summary "Duration:"
  # line alone.
  { pattern = '^(\s*(?:✓|⨯|×).*?)\s+\d+(?:\.\d+)?s\s*$', replacement = '$1' },
  # Collapse "dots only" parallel progress lines to empty.
  { pattern = '^\s*[.⨯×FESR]+\s*$', replacement = '' },
]

# Short-circuit to a 3-word summary ONLY when there are zero failures / errors
# / risks / incompletes / fatals / exceptions. The `unless` guard is
# load-bearing — removing it swallows failures.
match_output = [
  { pattern = '(?m)^\s*Tests:\s+\d+\s+passed', message = "artisan test: ok", unless = '(?i)(failed|error|risked|incomplete|fatal|exception|FAIL\b|⨯|✗|No tests found)' },
]

# On the failure / no-tests paths, keep only signal lines.
keep_lines_matching = [
  # FAIL / WARN / RISK / SKIP / INFO / ERROR group banners
  '^\s*(FAIL|WARN|RISK|SKIP|INFO|ERROR)\s+',
  # FAILED detail header (Pest prints "FAILED Tests\Foo > bar")
  '^\s*FAILED\s+',
  # Failure bullet (Pest unicode + PHPUnit ASCII)
  '^\s*(⨯|×|✗)\s',
  # Assertion diff
  '^\s+Failed asserting',
  # Source location ("at tests/Foo.php:N")
  '^\s*at\s+.+\.php:\d+',
  # Pest info lines we care about
  'No tests (found|executed)',
  # Plain error / exception prefixes (PHPUnit style & thrown messages)
  '(?i)^\s*(error|exception|fatal|uncaught)\b',
  # Summary lines
  '^\s*Tests:\s+',
  '^\s*Duration:',
  '^\s*Parallel:',
]

# 2 failures ≈ 18 kept lines, 10 failures ≈ 80.  100 is a comfortable ceiling.
max_lines = 100

# Safety net — match_output already handles the green case.
on_empty = "artisan test: ok"

# -----------------------------------------------------------------------------
# Inline tests — inputs use ANSI-stripped output (strip_ansi = true means the
# filter sees this form).  Triple-single-quote = TOML literal string = no
# escape interpretation, so brackets / backslashes are safe.
# -----------------------------------------------------------------------------

