[filters.artisan-inspire]
description = "artisan inspire — 1-line quote, minimal filtering"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+inspire\b'
strip_ansi = true
filter_stderr = true
strip_lines_matching = [
  '^\s*$',
]
