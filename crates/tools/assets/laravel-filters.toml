# =============================================================================
# AGENT 7 — phpunit + pint (direct)
# =============================================================================

# =============================================================================
# PHPUnit — direct invocation (vendor/bin/phpunit or `phpunit`)
# =============================================================================
#
# Output traits observed on PHPUnit 12.x:
#   - Banner: `PHPUnit X.Y.Z by Sebastian Bergmann and contributors.`
#   - Runtime / Configuration header lines.
#   - Progress dot line: `...F.. 7 / 7 (100%)` (may include ANSI color codes).
#   - Clean summary: `OK (N tests, M assertions)`.
#   - Failure summary: `ERRORS!` / `FAILURES!` then
#     `Tests: N, Assertions: M, Errors: K, Failures: L, Skipped: P, Incomplete: Q.`
#   - `--testdox` adds readable sentences (keep them — that's the signal).
#   - `--list-tests` / `--list-groups` emit `Available tests:` / `Available test group:`
#     followed by `- <name>` lines (keep them).

[filters.phpunit]
description = "PHPUnit direct — strip banner/progress, keep failures + summary + testdox"
match_command = '^(?:php\s+)?(?:\./)?vendor/bin/phpunit\b|^phpunit\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^OK\s+\(\d+ tests?,\s+\d+ assertions?\)', message = "phpunit: ok", unless = '(?i)(failure|error|risk|incomplete|skip|fatal|exception)' },
]
strip_lines_matching = [
  '^PHPUnit \d+\.\d+\.\d+ by Sebastian Bergmann',
  '^Runtime:\s',
  '^Configuration:\s',
  '^Time:\s.*Memory:',
  '^\s*\.+\s*\d+\s*/\s*\d+\s*\(\s*\d+%\)\s*$',
  '^[.FEISR]+\s+\d+\s*/\s*\d+\s*\(\s*\d+%\)\s*$',
  '^\s*--\s*$',
  '^\s*$',
]
max_lines = 120
on_empty = "phpunit: ok"

