# -- composer dump-autoload -----------------------------------------------------
[filters.composer-dump-autoload]
description = "composer dump-autoload / du — one-line summary"
match_command = '^composer\s+(dump-autoload|du|dumpautoload)\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^Generated (optimized )?autoload files', message = "composer: autoload regenerated", unless = '(?i)(error|fail|fatal|exception|warning)' },
]
max_lines = 20
on_empty = "composer: autoload regenerated"

