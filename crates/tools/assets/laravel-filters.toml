# =============================================================================
# AGENT 2 — artisan DB / migrations
# =============================================================================

# =============================================================================
# Laravel artisan — database + migration commands
# Agent 2 (rtk-laravel-lab). Ordering: more-specific match_command patterns FIRST.
# =============================================================================

# --- migrate:fresh / migrate:refresh / migrate:rollback / migrate:reset -------
[filters.artisan-migrate-fresh]
description = "artisan migrate:fresh|refresh|rollback|reset — keep migration names, strip dots + timings"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+migrate:(fresh|refresh|rollback|reset)\b'
strip_ansi = true
filter_stderr = true
replace = [
  { pattern = '\s*\.{2,}\s*\d+(?:\.\d+)?\s*m?s\s+(DONE|FAIL)', replacement = ' $1' },
  { pattern = '\s*\.{2,}\s*(DONE|FAIL)', replacement = ' $1' },
  { pattern = '^\s+INFO\s+', replacement = 'INFO: ' },
]
strip_lines_matching = [
  '^\s*$',
  '^INFO: Loading stored database schemas',
  '^\s+database/schema/.*\s(DONE|FAIL)\s*$',
]
max_lines = 60
on_empty = "artisan migrate: nothing to do"

# --- migrate (plain) ---------------------------------------------------------
[filters.artisan-migrate]
description = "artisan migrate — keep migration names + DONE/FAIL, preserve SQLSTATE errors"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+migrate(\s|$)'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^\s*INFO[:\s]+Nothing to migrate', message = "artisan migrate: nothing to migrate", unless = '(?i)(error|exception|SQLSTATE|fail)' },
]
replace = [
  { pattern = '\s*\.{2,}\s*\d+(?:\.\d+)?\s*m?s\s+(DONE|FAIL)', replacement = ' $1' },
  { pattern = '\s*\.{2,}\s*(DONE|FAIL)', replacement = ' $1' },
  { pattern = '^\s+INFO\s+', replacement = 'INFO: ' },
]
strip_lines_matching = [
  '^\s*$',
  '^INFO: Preparing database',
  '^INFO: Loading stored database schemas',
  '^\s+Creating migration table\s+DONE\s*$',
  '^\s+database/schema/.*\s(DONE|FAIL)\s*$',
  '^\s+at vendor/',
  '^\s+\d+▕',
  '^\s+➜\s+\d+▕',
  '^\s+\[2m\+\d+ vendor frames',
  '^\s+\+\d+ vendor frames',
  '^\s+\d+\s+vendor/',
  '^\s+\d+\s+artisan:\d+',
]
max_lines = 40
on_empty = "artisan migrate: ok"

# --- db:seed -----------------------------------------------------------------
[filters.artisan-db-seed]
description = "artisan db:seed — collapse clean runs, keep SQLSTATE errors"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+db:seed\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^\s*INFO[:\s]+Seeding database', message = "artisan db:seed: ok", unless = '(?i)(error|exception|SQLSTATE|fail|violation)' },
]
replace = [
  { pattern = '\s*\.{2,}\s*\d+(?:\.\d+)?\s*m?s\s+(DONE|FAIL)', replacement = ' $1' },
  { pattern = '^\s+INFO\s+', replacement = 'INFO: ' },
]
strip_lines_matching = [
  '^\s*$',
  '^\s+at vendor/',
  '^\s+\d+▕',
  '^\s+➜\s+\d+▕',
  '^\s+\[2m\+\d+ vendor frames',
  '^\s+\+\d+ vendor frames',
]
max_lines = 40
on_empty = "artisan db:seed: ok"

# --- db:show -----------------------------------------------------------------
[filters.artisan-db-show]
description = "artisan db:show — table with connection info, drop dot padding"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+db:show\b'
strip_ansi = true
filter_stderr = true
replace = [
  { pattern = '\s*\.{3,}\s*', replacement = ': ' },
]
strip_lines_matching = [
  '^\s*$',
  '^\s*(Host|Port|Username|URL|Open Connections):\s*$',
]
truncate_lines_at = 200
max_lines = 80
on_empty = "artisan db:show: no output"

# --- db:table ----------------------------------------------------------------
[filters.artisan-db-table]
description = "artisan db:table <name> — compact column/index listing"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+db:table\b'
strip_ansi = true
filter_stderr = true
replace = [
  { pattern = '\s*\.{3,}\s*', replacement = ': ' },
]
strip_lines_matching = [
  '^\s*$',
]
truncate_lines_at = 200
max_lines = 80
on_empty = "artisan db:table: no output"

# --- schema:dump -------------------------------------------------------------
[filters.artisan-schema-dump]
description = "artisan schema:dump — one-line confirmation"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+schema:dump\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^\s*INFO[:\s]+Database schema dumped', message = "artisan schema:dump: ok", unless = '(?i)(error|exception|fail)' },
]
replace = [
  { pattern = '^\s+INFO\s+', replacement = 'INFO: ' },
]
strip_lines_matching = [
  '^\s*$',
]
max_lines = 20
on_empty = "artisan schema:dump: ok"

# --- db:wipe -----------------------------------------------------------------
[filters.artisan-db-wipe]
description = "artisan db:wipe — one-line confirmation"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+db:wipe\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^\s*INFO[:\s]+Dropped all tables', message = "artisan db:wipe: ok", unless = '(?i)(error|exception|fail)' },
]
replace = [
  { pattern = '^\s+INFO\s+', replacement = 'INFO: ' },
]
strip_lines_matching = [
  '^\s*$',
]
max_lines = 20
on_empty = "artisan db:wipe: ok"

# --- migrate:install ---------------------------------------------------------
[filters.artisan-migrate-install]
description = "artisan migrate:install — one-line confirmation"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+migrate:install\b'
strip_ansi = true
filter_stderr = true
match_output = [
  { pattern = '(?m)^\s*INFO[:\s]+Migration table', message = "artisan migrate:install: ok", unless = '(?i)(error|exception|fail)' },
]
replace = [
  { pattern = '^\s+INFO\s+', replacement = 'INFO: ' },
]
strip_lines_matching = [
  '^\s*$',
]
max_lines = 10
on_empty = "artisan migrate:install: ok"

