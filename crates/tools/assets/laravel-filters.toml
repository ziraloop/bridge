using dumb terminal settings.
Psy Shell v0.12.0 (PHP 8.5.0 — cli) by Justin Hileman
"""
expected = """Psy Shell v0.12.0 (PHP 8.5.0 — cli) by Justin Hileman"""

# =============================================================================
# GENERIC ARTISAN FALLBACK — must be LAST artisan filter
# Catches anything not covered by specific filters above.
# Broad match, but specific filters win because of first-match-wins ordering.
# =============================================================================

[filters.artisan-zz-generic]
description = "Fallback for any artisan command not covered by a specific filter"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\b'
strip_ansi = true
filter_stderr = true
strip_lines_matching = [
  '^\s*$',
  '^\s*INFO\s+$',
  # Symfony shell-completion boilerplate — not useful to the LLM
  '^# This file is part of the Symfony package\.$',
  '^# \(c\) Fabien Potencier',
  '^# For the full copyright',
  '^# https://symfony\.com/doc/',
]
truncate_lines_at = 240
max_lines = 60
on_empty = "artisan: ok"

