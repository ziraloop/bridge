# =============================================================================
# AGENT 3 — artisan make:* scaffolds
# =============================================================================

# =============================================================================
# Artisan make:* scaffolding commands
# =============================================================================
# Every `php artisan make:<thing>` command in Laravel 13 produces 1-N lines of
# the form:
#   "   INFO  <Type> [<path>] created successfully.  "
# separated by blank lines. Errors (already-exists etc.) produce:
#   "   ERROR  <Type> already exists.  "
# Composite commands (e.g. `make:model Comment -mfsc`) emit one INFO per file
# created. `make:component X` emits both a component class and a view line.
#
# Strategy: strip ANSI + blank lines + trailing whitespace, keep all INFO /
# ERROR / WARN lines verbatim. Do NOT use match_output (each invocation has a
# different path, and we want to preserve all lines from composite commands).

[filters.artisan-make]
description = "Laravel artisan make:* scaffolding — keep INFO/ERROR lines, drop blank separators"
match_command = '^(?:php\s+)?(?:\./)?(?:vendor/bin/sail\s+)?artisan\s+make:'
strip_ansi = true
filter_stderr = true
replace = [
  # Trim trailing whitespace that Laravel pads INFO lines with
  { pattern = '\s+$', replacement = '' },
  # Collapse the leading 3-space indent Laravel uses on status lines
  { pattern = '^\s{1,6}(INFO|ERROR|WARN|WARNING)\b', replacement = '$1' },
]
strip_lines_matching = [
  '^\s*$',
]
max_lines = 40
on_empty = "artisan make: ok"

